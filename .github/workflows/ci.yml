name: Playwright & Cucumber CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Automated Tests
    timeout-minutes: 15
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Install Dependencies
      run: npm install

    - name: Get Playwright Version
      id: playwright-version
      run: echo "PLAYWRIGHT_VERSION=$(node -e "console.log(require('@playwright/test/package.json').version)")" >> $GITHUB_ENV

    - name: Cache Playwright Browsers
      id: cache-playwright
      uses: actions/cache@v4
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-${{ env.PLAYWRIGHT_VERSION }}
        restore-keys: |
          ${{ runner.os }}-playwright-

    - name: Install Playwright Chromium Browser & OS Dependencies
      run: npx playwright install --with-deps chromium

    - name: Run Tests
      run: npm test
      env:
        CI: 'true'

    - name: Upload Cucumber HTML Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: cucumber-test-report
        path: cucumber-report.html
        retention-days: 30
